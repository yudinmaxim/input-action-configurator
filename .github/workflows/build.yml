name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libgtk-3-dev libayatana-appindicator3-dev libfuse2
          
      - name: Install npm dependencies
        run: npm install
        
      - name: Install Tauri CLI
        run: npm install -D @tauri-apps/cli@latest
        
      - name: Build Tauri app
        run: |
          cd src-tauri
          cargo tauri build --target x86_64-unknown-linux-gnu --bundles appimage
        
      - name: Show build artifacts
        run: |
          echo "=== AppImage artifacts ==="
          find src-tauri/target -name "*.AppImage" -type f
          
      - name: Create Release and Upload AppImage
        uses: ncipollo/release-action@v1
        with:
          artifacts: "src-tauri/target/x86_64-unknown-linux-gnu/release/Input_Action_Configurator*.AppImage"
          name: Input Action Configurator ${{ github.ref_name }}
          body: "Input Action Configurator - Configuration editor for InputActions"
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true