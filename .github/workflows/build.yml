name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    container:
      image: registry.altlinux.org/p11/amd64/generic:latest
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            webkit2gtk-4.1-devel \
            librsvg-devel \
            patchelf \
            gtk3-devel \
            libayatana-appindicator3-devel \
            fuse \
            squashfs-tools \
            alsa-lib-devel \
            flite \
            libavif-devel \
            libjxl-devel \
            hidapi-devel \
            liblz4-devel \
            libzstd-devel \
            libsecret-devel \
            libX11-devel \
            libXext-devel \
            libXcursor-devel \
            libXdamage-devel \
            libXfixes-devel \
            libXrandr-devel \
            libXi-devel \
            libxkbcommon-devel \
            mesa-libGL-devel \
            mesa-libEGL-devel \
            gstreamer1.0-devel \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav
          
      - name: Install npm dependencies
        run: npm install
        
      - name: Install Tauri CLI
        run: npm install -D @tauri-apps/cli@latest
        
      - name: Build Tauri app
        run: npx tauri build --target x86_64-unknown-linux-gnu --bundles appimage
        
      - name: Show build artifacts
        run: |
          echo "=== AppImage artifacts ==="
          find src-tauri/target -name "*.AppImage" -type f
          ls -lh src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/ || echo "Directory does not exist"
          
      - name: Verify AppImage exists and check contents
        run: |
          APPIMAGE=$(find src-tauri/target -name "*.AppImage" -type f | head -n 1)
          if [ -z "$APPIMAGE" ]; then
            echo "Error: No AppImage found!"
            exit 1
          fi
          echo "Found AppImage: $APPIMAGE"
          echo "Size: $(ls -lh "$APPIMAGE" | awk '{print $5}')"
          echo "=== AppImage contents preview ==="
          unsquashfs -l "$APPIMAGE" 2>/dev/null | head -50 || echo "Cannot list contents (may need squashfs-tools)"
          echo "APPIMAGE_PATH=$APPIMAGE" >> $GITHUB_ENV
          
      - name: Create Release and Upload AppImage
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ env.APPIMAGE_PATH }}"
          name: Input Action Configurator ${{ github.ref_name }}
          body: "Input Action Configurator - Configuration editor for InputActions"
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true